<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4CATS Home Office</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; font-size: 13px; }

/* LOGIN */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.login-card { background: white; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 2rem; width: 100%; max-width: 380px; }
.login-card h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
.login-card p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
.login-card input { width: 100%; padding: 10px 12px; border: 0.5px solid #d0d0c8; border-radius: 8px; font-size: 14px; margin-bottom: 10px; outline: none; display: block; }
.login-card input:focus { border-color: #888; }
.login-card button { width: 100%; padding: 10px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.error-msg { color: #c0392b; font-size: 12px; margin-top: 8px; display: none; }

/* LAYOUT */
#app-screen { display: none; }
.top-bar { background: #1a1a1a; color: white; padding: 0 1.5rem; display: flex; align-items: center; gap: 1.5rem; height: 48px; position: sticky; top: 0; z-index: 100; }
.top-bar-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; margin-right: 1rem; }
.top-bar-title span { color: #888; font-weight: 400; }
.tab-btn { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; padding: 0 4px; height: 48px; border-bottom: 2px solid transparent; transition: color 0.15s; }
.tab-btn:hover { color: #ccc; }
.tab-btn.active { color: white; border-bottom-color: white; }
.top-bar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.signout-btn { background: none; border: 0.5px solid #444; color: #888; font-size: 12px; cursor: pointer; padding: 5px 12px; border-radius: 6px; }
.signout-btn:hover { color: white; border-color: #666; }

/* CONTENT */
.tab-content { display: none; padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
.tab-content.active { display: block; }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; background: white; border: 0.5px solid #e0e0d8; border-radius: 10px; padding: 10px 14px; }
.toolbar-sep { width: 0.5px; height: 20px; background: #e0e0d8; margin: 0 2px; }
select, input[type="date"], input[type="text"] { border: 0.5px solid #d0d0c8; border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none; background: white; color: #1a1a1a; height: 32px; }
select:focus, input:focus { border-color: #888; }
.toolbar label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
.toolbar-group { display: flex; align-items: center; gap: 6px; }
.btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 0.5px solid #d0d0c8; background: white; color: #1a1a1a; height: 32px; white-space: nowrap; }
.btn:hover { background: #f5f5f0; }
.btn-primary { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.btn-primary:hover { background: #333; }
.btn-warn { background: #fff3e0; color: #e65100; border-color: #ffcc80; }
.btn-warn.active { background: #e65100; color: white; border-color: #e65100; }
.btn-full { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
.btn-full.active { background: #2e7d32; color: white; border-color: #2e7d32; }

/* STATS ROW */
.stats-row { display: flex; gap: 12px; margin-bottom: 1.25rem; }
.stat-card { background: white; border: 0.5px solid #e0e0d8; border-radius: 10px; padding: 14px 18px; flex: 1; }
.stat-card .val { font-size: 24px; font-weight: 600; line-height: 1; }
.stat-card .lbl { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-card.warn .val { color: #e65100; }
.stat-card.good .val { color: #2e7d32; }

/* SCHEDULE TABLE */
.schedule-wrap { background: white; border: 0.5px solid #e0e0d8; border-radius: 12px; overflow: hidden; }
.sch-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.sch-table th { padding: 9px 12px; text-align: left; font-weight: 500; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 0.5px solid #e0e0d8; background: #fafaf8; white-space: nowrap; position: sticky; top: 48px; z-index: 10; }
.sch-table td { padding: 9px 12px; border-bottom: 0.5px solid #f5f5f0; vertical-align: middle; }
.sch-table tr:last-child td { border-bottom: none; }
.sch-table tr.day-header td { background: #f0f0e8; font-weight: 600; font-size: 12px; color: #444; padding: 8px 12px; }
.sch-table tr.day-header.today td { background: #e8e8e0; color: #1a1a1a; }
.sch-table tr:hover td { background: #fafaf8; }
.sch-table tr.day-header:hover td { background: #f0f0e8; }
.sch-table tr.day-header.today:hover td { background: #e8e8e0; }

/* ROW HIGHLIGHTS */
.sch-table tr.row-zero-warn td { background: #fff8f0; }
.sch-table tr.row-zero-warn:hover td { background: #fff3e0; }
.sch-table tr.row-full td { background: #f0faf0; }
.sch-table tr.row-full:hover td { background: #e8f5e9; }

/* BADGES */
.badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; display: inline-block; }
.badge-party { background: #fce8f0; color: #99354e; }
.badge-workshop { background: #e8f0fe; color: #1a4fa0; }
.badge-glazing { background: #e8f5e9; color: #2e7d32; }
.badge-class { background: #fff3e0; color: #e65100; }
.badge-camp { background: #f3e5f5; color: #6a1b9a; }

/* REG PILL */
.reg-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-weight: 600; font-size: 11px; }
.reg-zero { color: #bbb; }
.reg-some { background: #e8f0fe; color: #1a4fa0; }
.reg-warn { background: #fff3e0; color: #e65100; }
.reg-full { background: #e8f5e9; color: #2e7d32; font-weight: 700; }

/* SHOW/PUBLISH TOGGLES */
.toggle-wrap { display: flex; gap: 6px; }
.sp-toggle { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 3px 8px; border-radius: 6px; border: 0.5px solid #e0e0d8; background: white; font-size: 11px; color: #888; transition: all 0.1s; user-select: none; }
.sp-toggle.on-show { background: #e8f0fe; color: #1a4fa0; border-color: #c5d8fc; }
.sp-toggle.on-publish { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
.sp-toggle input { display: none; }
.sp-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.6; }

/* STUDIO FILTER PILLS */
.studio-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
.studio-pill { padding: 4px 10px; border-radius: 20px; border: 0.5px solid #d0d0c8; background: white; font-size: 11px; cursor: pointer; color: #666; transition: all 0.1s; }
.studio-pill:hover { border-color: #888; color: #1a1a1a; }
.studio-pill.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }

/* BY WORKSHOP VIEW */
.workshop-grid { display: flex; flex-direction: column; gap: 1rem; }
.workshop-block { background: white; border: 0.5px solid #e0e0d8; border-radius: 12px; overflow: hidden; }
.workshop-block-header { padding: 12px 16px; border-bottom: 0.5px solid #f0f0e8; display: flex; align-items: center; gap: 10px; }
.workshop-block-title { font-weight: 600; font-size: 14px; }
.workshop-block-date { font-size: 12px; color: #888; }
.workshop-studios { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; background: #f0f0e8; border-top: 0.5px solid #f0f0e8; }
.workshop-studio-cell { background: white; padding: 10px 14px; }
.workshop-studio-name { font-size: 11px; color: #888; margin-bottom: 4px; }
.workshop-studio-reg { font-size: 18px; font-weight: 600; }
.workshop-total-cell { background: #fafaf8; padding: 10px 14px; border-left: 2px solid #e0e0d8; }
.workshop-total-cell .workshop-studio-name { color: #444; font-weight: 500; }
.workshop-total-cell .workshop-studio-reg { color: #1a1a1a; }

/* BY STUDIO VIEW */
.studio-split { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.split-panel { background: white; border: 0.5px solid #e0e0d8; border-radius: 12px; overflow: hidden; }
.split-panel-header { padding: 12px 16px; border-bottom: 0.5px solid #e0e0d8; font-weight: 600; font-size: 13px; background: #fafaf8; }
.split-list { overflow-y: auto; max-height: 600px; }
.split-item { padding: 10px 16px; border-bottom: 0.5px solid #f5f5f0; display: flex; align-items: center; justify-content: space-between; }
.split-item:last-child { border-bottom: none; }
.split-item-title { font-size: 12px; font-weight: 500; }
.split-item-sub { font-size: 11px; color: #888; margin-top: 2px; }
.split-item-reg { font-size: 16px; font-weight: 600; color: #1a4fa0; }
.split-item.inactive { opacity: 0.4; }

.loading { text-align: center; padding: 3rem; color: #888; }
.empty { text-align: center; padding: 3rem; color: #888; font-size: 13px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>4CATS Home Office</h1>
    <p>Sign in to access the dashboard</p>
    <input type="email" id="email-input" placeholder="Email address">
    <input type="password" id="password-input" placeholder="Password">
    <button onclick="signIn()">Sign in</button>
    <div class="error-msg" id="error-msg">Incorrect email or password, or insufficient permissions.</div>
  </div>
</div>

<div id="app-screen">
  <div class="top-bar">
    <div class="top-bar-title">4CATS <span>Home Office</span></div>
    <button class="tab-btn active" onclick="switchTab('schedule')">Schedule</button>
    <button class="tab-btn" onclick="switchTab('workshop')">By Workshop</button>
    <button class="tab-btn" onclick="switchTab('studio')">By Studio</button>
    <div class="top-bar-right">
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <!-- SCHEDULE TAB -->
  <div class="tab-content active" id="tab-schedule">
    <div class="toolbar">
      <div class="toolbar-group">
        <label>From</label>
        <input type="date" id="sch-from">
        <label>To</label>
        <input type="date" id="sch-to">
        <button class="btn btn-primary" onclick="loadSchedule()">Load</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <label>Studio</label>
        <select id="sch-studio">
          <option value="">All studios</option>
        </select>
      </div>
      <div class="toolbar-group">
        <label>Type</label>
        <select id="sch-type">
          <option value="">All types</option>
          <option value="workshop">Workshop</option>
          <option value="party">Party</option>
          <option value="glazing">Glazing</option>
          <option value="class">Class</option>
          <option value="camp">Camp</option>
        </select>
      </div>
      <div class="toolbar-group">
        <label>Search</label>
        <input type="text" id="sch-search" placeholder="Workshop name..." style="width:160px" oninput="renderSchedule()">
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <label>Highlight</label>
        <button class="btn btn-warn" id="btn-zero" onclick="toggleHighlight('zero')">0 Reg</button>
        <button class="btn btn-full" id="btn-full" onclick="toggleHighlight('full')">Full</button>
      </div>
      <div class="toolbar-group">
        <label>0 Reg before</label>
        <input type="date" id="sch-zero-date" oninput="renderSchedule()" title="Highlight sessions with 0 registrations before this date">
      </div>
    </div>

    <div class="stats-row" id="stats-row"></div>
    <div class="schedule-wrap">
      <table class="sch-table">
        <thead>
          <tr>
            <th style="width:90px">Time</th>
            <th>Session</th>
            <th style="width:80px">Studio</th>
            <th style="width:60px">Type</th>
            <th style="width:70px;text-align:center">Reg</th>
            <th style="width:60px;text-align:center">Cap</th>
            <th style="width:130px">Show / Publish</th>
          </tr>
        </thead>
        <tbody id="sch-body"><tr><td colspan="7" class="loading">Select a date range and click Load.</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- BY WORKSHOP TAB -->
  <div class="tab-content" id="tab-workshop">
    <div class="toolbar">
      <div class="toolbar-group">
        <label>From</label>
        <input type="date" id="wk-from">
        <label>To</label>
        <input type="date" id="wk-to">
        <button class="btn btn-primary" onclick="loadWorkshopView()">Load</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <label>Search workshop</label>
        <input type="text" id="wk-search" placeholder="e.g. hedgehog..." style="width:180px" oninput="renderWorkshopView()">
      </div>
      <div class="toolbar-group">
        <label>0 Reg before</label>
        <input type="date" id="wk-zero-date" oninput="renderWorkshopView()">
      </div>
    </div>
    <div id="workshop-container"><div class="empty">Select a date range and click Load.</div></div>
  </div>

  <!-- BY STUDIO TAB -->
  <div class="tab-content" id="tab-studio">
    <div class="toolbar">
      <div class="toolbar-group">
        <label>Studio</label>
        <select id="bs-studio" onchange="loadStudioView()">
          <option value="">Select a studio...</option>
        </select>
      </div>
      <div class="toolbar-group">
        <label>From</label>
        <input type="date" id="bs-from">
        <label>To</label>
        <input type="date" id="bs-to">
        <button class="btn btn-primary" onclick="loadStudioView()">Load</button>
      </div>
    </div>
    <div id="studio-split-container"><div class="empty">Select a studio and date range.</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://snxibhbhhchjthfmjtaj.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNueGliaGJoaGNoanRoZm1qdGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTk2ODAsImV4cCI6MjA5MjYzNTY4MH0.K-89Mx4SxU6N1hMmtK6Q79rWAtk6VTN9b5wemQxcZVA'
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

let currentUser = null
let allStudios = []
let scheduleData = []
let workshopData = []
let highlightMode = null

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) { currentUser = session.user; initApp() }
})

async function signIn() {
  const email = document.getElementById('email-input').value
  const password = document.getElementById('password-input').value
  const errEl = document.getElementById('error-msg')
  errEl.style.display = 'none'
  const { data, error } = await sb.auth.signInWithPassword({ email, password })
  if (error) { errEl.style.display = 'block'; return }
  currentUser = data.user
  await initApp()
}

async function signOut() {
  await sb.auth.signOut()
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('app-screen').style.display = 'none'
}

async function initApp() {
  // Check admin role
  const { data: mapping } = await sb.from('studio_users').select('role').eq('user_id', currentUser.id).single()
  if (!mapping || mapping.role !== 'admin') {
    document.getElementById('error-msg').textContent = 'This account does not have home office access.'
    document.getElementById('error-msg').style.display = 'block'
    await sb.auth.signOut()
    return
  }

  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app-screen').style.display = 'block'

  // Load studios
  const { data: studios } = await sb.from('studios').select('id, name').order('name')
  allStudios = studios || []

  // Populate studio dropdowns
  const opts = allStudios.map(s => `<option value="${s.id}">${s.name}</option>`).join('')
  document.getElementById('sch-studio').innerHTML = '<option value="">All studios</option>' + opts
  document.getElementById('bs-studio').innerHTML = '<option value="">Select a studio...</option>' + opts

  // Set default date ranges
  const today = dateStr(new Date())
  const in14 = dateStr(addDays(new Date(), 14))
  ;['sch-from', 'wk-from'].forEach(id => document.getElementById(id).value = today)
  ;['sch-to', 'wk-to'].forEach(id => document.getElementById(id).value = in14)
  document.getElementById('bs-from').value = today
  document.getElementById('bs-to').value = today
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['schedule','workshop','studio'][i] === tab))
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
  document.getElementById(`tab-${tab}`).classList.add('active')
}

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r }
function fmtDate(s) {
  const d = new Date(s + 'T12:00:00')
  return d.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' })
}
function isToday(s) { return s === dateStr(new Date()) }
function getBadge(type) {
  return { party:'badge-party', workshop:'badge-workshop', glazing:'badge-glazing', class:'badge-class', camp:'badge-camp' }[type] || 'badge-workshop'
}
function getStudioName(id) {
  const s = allStudios.find(s => s.id === id)
  return s ? s.name.replace('4CATS Art Studios - ','').replace('4Cats Art Studios - ','') : id
}

function toggleHighlight(mode) {
  highlightMode = highlightMode === mode ? null : mode
  document.getElementById('btn-zero').classList.toggle('active', highlightMode === 'zero')
  document.getElementById('btn-full').classList.toggle('active', highlightMode === 'full')
  renderSchedule()
}

// ─── SCHEDULE TAB ──────────────────────────────────────────────
async function loadSchedule() {
  const from = document.getElementById('sch-from').value
  const to = document.getElementById('sch-to').value
  if (!from || !to) return
  document.getElementById('sch-body').innerHTML = '<tr><td colspan="7" class="loading">Loading...</td></tr>'
  document.getElementById('stats-row').innerHTML = ''

  const studioFilter = document.getElementById('sch-studio').value

  let q = sb.from('sessions').select('*').gte('session_date', from).lte('session_date', to).order('session_date').order('session_time')
  if (studioFilter) q = q.eq('studio_id', studioFilter)

  const { data: sessions } = await q
  if (!sessions || !sessions.length) {
    document.getElementById('sch-body').innerHTML = '<tr><td colspan="7" class="empty">No sessions found.</td></tr>'
    return
  }

  // Load booking counts
  const ids = sessions.map(s => s.id)
  const { data: bookings } = await sb.from('bookings').select('session_id, qty').in('session_id', ids)
  const counts = {}
  if (bookings) bookings.forEach(b => { counts[b.session_id] = (counts[b.session_id] || 0) + (b.qty || 0) })

  scheduleData = sessions.map(s => ({ ...s, reg: counts[s.id] || 0 }))
  renderSchedule()
}

function renderSchedule() {
  const search = document.getElementById('sch-search').value.toLowerCase().trim()
  const typeFilter = document.getElementById('sch-type').value
  const zeroDate = document.getElementById('sch-zero-date').value

  let filtered = scheduleData.filter(s => {
    if (typeFilter && s.session_type !== typeFilter) return false
    if (search && !s.title.toLowerCase().includes(search)) return false
    return true
  })

  // Stats
  const total = filtered.length
  const zeroReg = filtered.filter(s => s.reg === 0 && s.show).length
  const fullSessions = filtered.filter(s => s.reg >= s.capacity && s.capacity > 0).length
  const totalReg = filtered.reduce((sum, s) => sum + s.reg, 0)

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="val">${total}</div><div class="lbl">Sessions</div></div>
    <div class="stat-card"><div class="val">${totalReg}</div><div class="lbl">Total Registrations</div></div>
    <div class="stat-card warn"><div class="val">${zeroReg}</div><div class="lbl">Showing with 0 Reg</div></div>
    <div class="stat-card good"><div class="val">${fullSessions}</div><div class="lbl">Full Sessions</div></div>
  `

  // Group by date
  const byDate = {}
  filtered.forEach(s => {
    if (!byDate[s.session_date]) byDate[s.session_date] = []
    byDate[s.session_date].push(s)
  })

  const today = dateStr(new Date())
  let html = ''

  Object.keys(byDate).sort().forEach(date => {
    const isT = date === today
    html += `<tr class="day-header${isT ? ' today' : ''}"><td colspan="7">${isT ? '● ' : ''}${fmtDate(date)}</td></tr>`

    byDate[date].forEach(s => {
      const time = s.session_time ? s.session_time.substring(0,5) : ''
      const badge = getBadge(s.session_type)
      const studioName = getStudioName(s.studio_id)
      const isFull = s.capacity > 0 && s.reg >= s.capacity
      const isZeroWarn = s.reg === 0 && s.show && (!zeroDate || date <= zeroDate)

      let regClass = 'reg-zero'
      if (s.reg > 0 && !isFull) regClass = 'reg-some'
      if (isFull) regClass = 'reg-full'
      if (s.reg === 0 && isZeroWarn) regClass = 'reg-warn'

      let rowClass = ''
      if (highlightMode === 'zero' && isZeroWarn) rowClass = 'row-zero-warn'
      if (highlightMode === 'full' && isFull) rowClass = 'row-full'
      // Always highlight if zeroDate filter matches regardless of highlight mode
      if (zeroDate && isZeroWarn && highlightMode !== 'full') rowClass = 'row-zero-warn'

      const showClass = s.show ? 'on-show' : ''
      const publishClass = s.publish ? 'on-publish' : ''

      html += `<tr class="${rowClass}" data-id="${s.id}">
        <td style="color:#888;font-size:11px">${time}</td>
        <td style="font-weight:500">${s.title}</td>
        <td style="color:#888;font-size:11px">${studioName}</td>
        <td><span class="badge ${badge}">${s.session_type}</span></td>
        <td style="text-align:center"><span class="reg-pill ${regClass}">${s.reg}</span></td>
        <td style="text-align:center;color:#888">${s.capacity}</td>
        <td>
          <div class="toggle-wrap">
            <label class="sp-toggle ${showClass}" id="show-lbl-${s.id}" onclick="toggleField('${s.id}','show',${!s.show})">
              <span class="sp-dot"></span> Show
            </label>
            <label class="sp-toggle ${publishClass}" id="pub-lbl-${s.id}" onclick="toggleField('${s.id}','publish',${!s.publish})">
              <span class="sp-dot"></span> Publish
            </label>
          </div>
        </td>
      </tr>`
    })
  })

  document.getElementById('sch-body').innerHTML = html || '<tr><td colspan="7" class="empty">No sessions match your filters.</td></tr>'
}

async function toggleField(sessionId, field, value) {
  // Optimistic UI update
  const s = scheduleData.find(x => x.id === sessionId)
  if (!s) return
  s[field] = value

  const lbl = document.getElementById(`${field === 'show' ? 'show' : 'pub'}-lbl-${sessionId}`)
  if (lbl) {
    const onClass = field === 'show' ? 'on-show' : 'on-publish'
    lbl.classList.toggle(onClass, value)
  }

  await sb.from('sessions').update({ [field]: value }).eq('id', sessionId)
}

// ─── BY WORKSHOP TAB ──────────────────────────────────────────────
async function loadWorkshopView() {
  const from = document.getElementById('wk-from').value
  const to = document.getElementById('wk-to').value
  if (!from || !to) return
  document.getElementById('workshop-container').innerHTML = '<div class="loading">Loading...</div>'

  const { data: sessions } = await sb.from('sessions').select('*').gte('session_date', from).lte('session_date', to).order('session_date').order('session_time')
  if (!sessions || !sessions.length) { document.getElementById('workshop-container').innerHTML = '<div class="empty">No sessions found.</div>'; return }

  const ids = sessions.map(s => s.id)
  const { data: bookings } = await sb.from('bookings').select('session_id, qty').in('session_id', ids)
  const counts = {}
  if (bookings) bookings.forEach(b => { counts[b.session_id] = (counts[b.session_id] || 0) + (b.qty || 0) })

  workshopData = sessions.map(s => ({ ...s, reg: counts[s.id] || 0 }))
  renderWorkshopView()
}

function renderWorkshopView() {
  const search = document.getElementById('wk-search').value.toLowerCase().trim()
  const zeroDate = document.getElementById('wk-zero-date').value

  // Group by title + date
  const groups = {}
  workshopData.forEach(s => {
    if (search && !s.title.toLowerCase().includes(search)) return
    const key = `${s.session_date}__${s.session_time}__${s.title}`
    if (!groups[key]) groups[key] = { title: s.title, date: s.session_date, time: s.session_time, type: s.session_type, studios: [] }
    groups[key].studios.push({ studio_id: s.studio_id, reg: s.reg, capacity: s.capacity })
  })

  const sorted = Object.values(groups).filter(g => g.studios.length > 1).sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time))

  if (!sorted.length) {
    document.getElementById('workshop-container').innerHTML = '<div class="empty">No workshops offered across multiple studios in this range.</div>'
    return
  }

  let html = '<div class="workshop-grid">'
  sorted.forEach(g => {
    const total = g.studios.reduce((sum, s) => sum + s.reg, 0)
    const time = g.time ? g.time.substring(0,5) : ''
    const badge = getBadge(g.type)
    const isZeroWarn = zeroDate && g.date <= zeroDate && total === 0

    html += `<div class="workshop-block" style="${isZeroWarn ? 'border-color:#ffcc80' : ''}">
      <div class="workshop-block-header" style="${isZeroWarn ? 'background:#fff8f0' : ''}">
        <span class="badge ${badge}">${g.type}</span>
        <div class="workshop-block-title">${g.title}</div>
        <div class="workshop-block-date">${fmtDate(g.date)} at ${time}</div>
      </div>
      <div class="workshop-studios">`

    g.studios.forEach(s => {
      const isFull = s.capacity > 0 && s.reg >= s.capacity
      const regColor = s.reg === 0 ? '#bbb' : isFull ? '#2e7d32' : '#1a4fa0'
      html += `<div class="workshop-studio-cell">
        <div class="workshop-studio-name">${getStudioName(s.studio_id)}</div>
        <div class="workshop-studio-reg" style="color:${regColor}">${s.reg}<span style="font-size:11px;font-weight:400;color:#bbb"> / ${s.capacity}</span></div>
      </div>`
    })

    html += `<div class="workshop-total-cell">
        <div class="workshop-studio-name">Total</div>
        <div class="workshop-studio-reg">${total}</div>
      </div>
    </div></div>`
  })

  html += '</div>'
  document.getElementById('workshop-container').innerHTML = html
}

// ─── BY STUDIO TAB ──────────────────────────────────────────────
async function loadStudioView() {
  const studioId = document.getElementById('bs-studio').value
  const from = document.getElementById('bs-from').value
  const to = document.getElementById('bs-to').value
  if (!studioId) return
  document.getElementById('studio-split-container').innerHTML = '<div class="loading">Loading...</div>'

  // All sessions across ALL studios in range
  const { data: allNetworkSessions } = await sb.from('sessions').select('*')
    .gte('session_date', from)
    .lte('session_date', to)
    .order('session_date').order('session_time')

  // This studio's sessions in range
  const studioSessions = (allNetworkSessions || []).filter(s => s.studio_id === studioId)
  const studioTitles = new Set(studioSessions.map(s => s.title))

  // Booking counts for this studio's sessions
  const ids = studioSessions.map(s => s.id)
  const counts = {}
  if (ids.length) {
    const { data: bookings } = await sb.from('bookings').select('session_id, qty').in('session_id', ids)
    if (bookings) bookings.forEach(b => { counts[b.session_id] = (counts[b.session_id] || 0) + (b.qty || 0) })
  }

  const studioSessionsWithReg = studioSessions.map(s => ({ ...s, reg: counts[s.id] || 0 }))
  const activeStudioSessions = studioSessionsWithReg.filter(s => s.show)
  const studioName = getStudioName(studioId)

  // Build network catalogue — unique titles across all studios, grouped by date
  const byDate = {}
  ;(allNetworkSessions || []).forEach(s => {
    if (!byDate[s.session_date]) byDate[s.session_date] = {}
    if (!byDate[s.session_date][s.title]) {
      byDate[s.session_date][s.title] = { type: s.session_type, time: s.session_time, studios: [] }
    }
    byDate[s.session_date][s.title].studios.push(s.studio_id)
  })

  // LEFT — network catalogue
  let leftHtml = ''
  Object.keys(byDate).sort().forEach(date => {
    leftHtml += `<div style="padding:8px 16px;background:#f5f5f0;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.4px">${fmtDate(date)}</div>`
    Object.entries(byDate[date]).sort((a,b) => a[1].time.localeCompare(b[1].time)).forEach(([title, info]) => {
      const isOffered = studioTitles.has(title)
      const badge = getBadge(info.type)
      const time = info.time ? info.time.substring(0,5) : ''
      const studioCount = info.studios.length
      leftHtml += `<div class="split-item${isOffered ? '' : ' inactive'}">
        <div>
          <div class="split-item-title">${title}</div>
          <div class="split-item-sub">${time} · <span class="badge ${badge}">${info.type}</span> · ${studioCount} studio${studioCount !== 1 ? 's' : ''}</div>
        </div>
        ${isOffered
          ? '<span style="color:#2e7d32;font-size:11px;white-space:nowrap">● Offered</span>'
          : '<span style="color:#bbb;font-size:11px;white-space:nowrap">○ Not offered</span>'}
      </div>`
    })
  })
  if (!leftHtml) leftHtml = '<div class="empty">No sessions found in this date range.</div>'

  // RIGHT — this studio's visible sessions with reg counts
  let rightHtml = ''
  let lastDate = null
  activeStudioSessions.forEach(s => {
    if (s.session_date !== lastDate) {
      rightHtml += `<div style="padding:8px 16px;background:#f5f5f0;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.4px">${fmtDate(s.session_date)}</div>`
      lastDate = s.session_date
    }
    const isFull = s.capacity > 0 && s.reg >= s.capacity
    const regColor = s.reg === 0 ? '#bbb' : isFull ? '#2e7d32' : '#1a4fa0'
    const time = s.session_time ? s.session_time.substring(0,5) : ''
    rightHtml += `<div class="split-item">
      <div>
        <div class="split-item-title">${s.title}</div>
        <div class="split-item-sub">${time} · Cap ${s.capacity}</div>
      </div>
      <div class="split-item-reg" style="color:${regColor}">${s.reg}</div>
    </div>`
  })
  if (!rightHtml) rightHtml = '<div class="empty">No visible sessions in this date range.</div>'

  document.getElementById('studio-split-container').innerHTML = `
    <div class="studio-split">
      <div class="split-panel">
        <div class="split-panel-header">Network Catalogue — All Studios <span style="font-weight:400;color:#888;font-size:11px">(dimmed = not offered by ${studioName})</span></div>
        <div class="split-list">${leftHtml}</div>
      </div>
      <div class="split-panel">
        <div class="split-panel-header">Active Schedule — ${studioName}</div>
        <div class="split-list">${rightHtml}</div>
      </div>
    </div>`
}
</script>
