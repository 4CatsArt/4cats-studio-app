<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4CATS Studio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

/* LOGIN */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.login-card { background: white; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 2rem; width: 100%; max-width: 380px; }
.login-card h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
.login-card p { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
.login-card input { width: 100%; padding: 10px 12px; border: 0.5px solid #d0d0c8; border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none; display: block; }
.login-card input:focus { border-color: #888; }
.login-card button { width: 100%; padding: 10px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.error-msg { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }

/* APP */
#app-screen { display: none; padding: 1.5rem 2rem; max-width: 1100px; margin: 0 auto; }

/* HEADER */
.app-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
.app-header h1 { font-size: 20px; font-weight: 500; }
.meta { font-size: 13px; color: #888; }
.signout-btn { font-size: 13px; color: #888; background: none; border: none; cursor: pointer; padding: 6px 12px; border-radius: 6px; }
.signout-btn:hover { background: #eee; }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.toolbar-left { display: flex; align-items: center; gap: 8px; }
.toolbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.nav-btn { background: white; border: 0.5px solid #d0d0c8; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #1a1a1a; }
.nav-btn:hover { background: #f5f5f0; }
.today-btn { background: #1a1a1a; color: white; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
.date-picker { border: 0.5px solid #d0d0c8; border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; background: white; cursor: pointer; }
.date-picker:focus { border-color: #888; }
.view-toggle { display: flex; border: 0.5px solid #d0d0c8; border-radius: 6px; overflow: hidden; }
.view-btn { padding: 6px 14px; font-size: 13px; cursor: pointer; background: white; border: none; color: #888; }
.view-btn.active { background: #1a1a1a; color: white; }
.filter-input { border: 0.5px solid #d0d0c8; border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; width: 160px; }
.filter-input:focus { border-color: #888; }
.type-filter { border: 0.5px solid #d0d0c8; border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; background: white; cursor: pointer; }

/* DAY VIEW */
.date-bar { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: #444; }
.session-card { background: white; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 1.25rem; margin-bottom: 1rem; }
.session-card.party-card { border-color: #f0b8cc; }
.session-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.session-title { font-size: 16px; font-weight: 500; }
.session-time { font-size: 14px; color: #888; margin-top: 2px; }
.session-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.badge-party { background: #fce8f0; color: #99354e; }
.badge-workshop { background: #e8f0fe; color: #1a4fa0; }
.badge-glazing { background: #e8f5e9; color: #2e7d32; }
.badge-class { background: #fff3e0; color: #e65100; }
.badge-camp { background: #f3e5f5; color: #6a1b9a; }
.session-stats { display: flex; gap: 1.5rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid #f0f0e8; }
.stat { text-align: center; }
.stat-value { font-size: 22px; font-weight: 500; }
.stat-label { font-size: 11px; color: #888; margin-top: 2px; }
.stat-warn { color: #e65100; }
.stat-clickable { cursor: pointer; }
.stat-clickable .stat-value { text-decoration: underline; text-decoration-style: dotted; }
.session-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-group.full { grid-column: 1 / -1; }
.field-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.field-group input[type="text"] { padding: 8px 10px; border: 0.5px solid #d0d0c8; border-radius: 6px; font-size: 14px; outline: none; width: 100%; }
.field-group input[type="text"]:focus { border-color: #888; }
.prep-row { display: flex; align-items: center; gap: 10px; }
.prep-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #1a1a1a; }
.prep-label { font-size: 14px; }
.prep-label.done { color: #2e7d32; font-weight: 500; }
.save-btn { margin-top: 12px; padding: 8px 20px; background: #1a1a1a; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; float: right; }
.save-btn:hover { background: #333; }
.save-btn.saved { background: #2e7d32; }
.party-info { background: #fce8f0; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #99354e; }

/* PRINT */
@media print {
  @page { size: landscape; margin: 1cm; }
  body > * { display: none !important; }
  .overlay { display: flex !important; position: static !important; background: none !important; padding: 0 !important; }
  .overlay-card { max-height: none !important; box-shadow: none !important; border: none !important; width: 100% !important; max-width: 100% !important; }
  .no-print { display: none !important; }
  .booking-table { width: 100% !important; font-size: 11px !important; }
  .booking-table th, .booking-table td { padding: 6px 8px !important; }
  .edit-input { border: none !important; border-bottom: 1px solid #999 !important; background: transparent !important; }
  .edit-input::placeholder { color: transparent !important; }
  input[type="checkbox"] { width: 14px !important; height: 14px !important; }
  input[type="text"], input[type="checkbox"] { print-color-adjust: exact; }
}
.print-btn { padding: 6px 16px; background: #f5f5f0; border: 0.5px solid #d0d0c8; border-radius: 6px; font-size: 13px; cursor: pointer; }
.print-btn:hover { background: #e8e8e0; }
.participant-name { font-weight: 500; color: #1a1a1a; }

/* INLINE EDIT INPUTS */
.edit-input { border: none; border-bottom: 1px solid #ccc; width: 100%; font-size: 13px; outline: none; background: transparent; padding: 2px 0; font-family: inherit; }
.edit-input:focus { border-bottom-color: #1a1a1a; }
.edit-input.short { width: 50px; }
.row-save-btn { margin-top: 4px; padding: 3px 10px; font-size: 11px; background: #1a1a1a; color: white; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
.row-save-btn:hover { background: #333; }
.row-save-btn.saved { background: #2e7d32; }

/* PARTY FORM */
.party-form { background: #fff5f8; border-radius: 10px; border: 0.5px solid #f0b8cc; padding: 1rem; margin-bottom: 1rem; }
.party-form-title { font-size: 11px; color: #99354e; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 12px; }
.party-form .session-fields { grid-template-columns: 1fr 1fr; }
.party-form .field-group input[type="text"] { border-color: #f0c8d4; background: white; }
.party-form .field-group input[type="text"]:focus { border-color: #99354e; }
.party-form .field-label { color: #99354e; }

.empty-state { text-align: center; padding: 4rem 2rem; color: #888; }
.empty-state h2 { font-size: 18px; font-weight: 400; margin-bottom: 0.5rem; }
.loading { text-align: center; padding: 4rem; color: #888; }

/* DAY DEFAULTS CARD */
.defaults-card { background: #fafaf8; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 1.25rem; margin-bottom: 1.5rem; }
.defaults-card .defaults-header { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.defaults-apply-btn { align-self: flex-end; padding: 8px 20px; background: #1a1a1a; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.defaults-apply-btn:hover { background: #333; }
.defaults-apply-btn.applied { background: #2e7d32; }

/* TABLE VIEW */
.table-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
.range-label { font-size: 13px; color: #888; }
.range-select { border: 0.5px solid #d0d0c8; border-radius: 6px; padding: 5px 8px; font-size: 13px; outline: none; background: white; }
.week-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 0.5px solid #e0e0d8; font-size: 13px; }
.week-table th { padding: 10px 12px; text-align: left; font-weight: 500; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 0.5px solid #e0e0d8; background: #fafaf8; white-space: nowrap; }
.week-table td { padding: 10px 12px; border-bottom: 0.5px solid #f5f5f0; vertical-align: top; }
.week-table tr:last-child td { border-bottom: none; }
.type-pill { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 4px; vertical-align: middle; }

/* OVERLAY */
.overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.overlay-card { background: white; border-radius: 12px; width: 100%; max-width: 1200px; max-height: 85vh; overflow: auto; padding: 1.5rem; }
.overlay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.overlay-title { font-size: 18px; font-weight: 500; }
.overlay-sub { font-size: 13px; color: #888; margin-top: 2px; }
.close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; padding: 4px 8px; line-height: 1; }
.booking-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.booking-table th { padding: 8px 10px; font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; border-bottom: 0.5px solid #e0e0d8; white-space: nowrap; }
.booking-table td { padding: 8px 10px; border-bottom: 1px solid #e8e8e0; vertical-align: middle; }
.booking-table tr:last-child td { border-bottom: none; }
.attended-check { width: 18px; height: 18px; cursor: pointer; accent-color: #2e7d32; }
.note-cell { color: #666; font-style: italic; font-size: 12px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>4CATS Studio</h1>
    <p>Sign in to view your schedule</p>
    <input type="email" id="email-input" placeholder="Email address">
    <input type="password" id="password-input" placeholder="Password">
    <button id="signin-btn" onclick="signIn()">Sign in</button>
    <div class="error-msg" id="error-msg">Incorrect email or password.</div>
  </div>
</div>

<div id="app-screen">
  <div class="app-header">
    <div>
      <h1 id="studio-name">Studio</h1>
      <div class="meta" id="studio-meta"></div>
    </div>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <button class="nav-btn" onclick="shiftDate(-1)">&#8592;</button>
      <input type="date" class="date-picker" id="date-picker" onchange="pickDate(this.value)">
      <button class="nav-btn" onclick="shiftDate(1)">&#8594;</button>
      <button class="today-btn" onclick="goToday()">Today</button>
    </div>
    <div class="toolbar-right">
      <input type="text" class="filter-input" id="keyword-filter" placeholder="Search sessions..." oninput="applyFilters()">
      <select class="type-filter" id="type-filter" onchange="applyFilters()">
        <option value="">All types</option>
        <option value="party">Party</option>
        <option value="workshop">Workshop</option>
        <option value="glazing">Glazing</option>
        <option value="class">Class</option>
        <option value="camp">Camp</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-day" onclick="setView('day')">Day</button>
        <button class="view-btn" id="btn-table" onclick="setView('table')">Week</button>
      </div>
    </div>
  </div>

  <div id="day-view">
    <div class="date-bar" id="date-bar"></div>
    <div id="sessions-container"><div class="loading">Loading...</div></div>
  </div>

  <div id="table-view" style="display:none">
    <div class="table-controls">
      <span class="range-label">Show</span>
      <select class="range-select" id="range-select" onchange="loadTableView()">
        <option value="7">7 days</option>
        <option value="14">14 days</option>
        <option value="21">21 days</option>
        <option value="28">28 days</option>
      </select>
      <span class="range-label">starting from selected date</span>
    </div>
    <div id="table-container"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://snxibhbhhchjthfmjtaj.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNueGliaGJoaGNoanRoZm1qdGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTk2ODAsImV4cCI6MjA5MjYzNTY4MH0.K-89Mx4SxU6N1hMmtK6Q79rWAtk6VTN9b5wemQxcZVA'
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) { currentUser = session.user; loadApp() }
})

let currentStudioId = null
let currentUser = null
let currentDate = new Date()
let currentView = 'day'

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}
function formatDate(d) {
  return d.toLocaleDateString('en-CA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r }
function getBadgeClass(type) {
  return { party:'badge-party', workshop:'badge-workshop', glazing:'badge-glazing', class:'badge-class', camp:'badge-camp' }[type] || 'badge-workshop'
}

// Determine which class list type to show based on session title and type
function getListType(sessionType, sessionTitle) {
  const t = (sessionTitle || '').toLowerCase()
  if (sessionType === 'glazing') return 'glazing'
  if (sessionType === 'party') return 'party'
  if (
    t.includes('camp') ||
    t.includes('pa day') ||
    t.includes('pd day') ||
    t.includes('pa/pd') ||
    t.includes('no school')
  ) return 'camp'
  return 'workshop'
}

async function signIn() {
  const emailEl = document.getElementById('email-input')
  const passwordEl = document.getElementById('password-input')
  const email = emailEl.value || emailEl.getAttribute('value') || ''
  const password = passwordEl.value || passwordEl.getAttribute('value') || ''
  const errEl = document.getElementById('error-msg')
  errEl.style.display = 'none'
  if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display = 'block'; return }
  const { data, error } = await sb.auth.signInWithPassword({ email, password })
  if (error) { errEl.textContent = 'Incorrect email or password.'; errEl.style.display = 'block'; return }
  currentUser = data.user
  await loadApp()
}

async function signOut() {
  await sb.auth.signOut()
  currentUser = null; currentStudioId = null
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('app-screen').style.display = 'none'
}

async function loadApp() {
  const { data: mapping } = await sb.from('studio_users').select('studio_id').eq('user_id', currentUser.id).single()
  if (!mapping) { alert('No studio linked to this account. Please contact home office.'); return }
  const { data: studio } = await sb.from('studios').select('name, city, province').eq('id', mapping.studio_id).single()
  if (!studio) { alert('Could not load studio information. Please contact home office.'); return }
  currentStudioId = mapping.studio_id
  document.getElementById('studio-name').textContent = studio.name
  document.getElementById('studio-meta').textContent = studio.city + ', ' + studio.province
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app-screen').style.display = 'block'
  syncDatePicker()
  await loadCurrentView()
}

function syncDatePicker() {
  document.getElementById('date-picker').value = dateStr(currentDate)
  document.getElementById('date-bar').textContent = formatDate(currentDate)
}
function shiftDate(n) { currentDate = addDays(currentDate, n); syncDatePicker(); loadCurrentView() }
function pickDate(val) { currentDate = new Date(val + 'T12:00:00'); syncDatePicker(); loadCurrentView() }
function goToday() { currentDate = new Date(); syncDatePicker(); loadCurrentView() }
function setView(v) {
  currentView = v
  document.getElementById('day-view').style.display = v === 'day' ? 'block' : 'none'
  document.getElementById('table-view').style.display = v === 'table' ? 'block' : 'none'
  document.getElementById('btn-day').classList.toggle('active', v === 'day')
  document.getElementById('btn-table').classList.toggle('active', v === 'table')
  loadCurrentView()
}
function applyFilters() { loadCurrentView() }
function getFilters() {
  return { keyword: document.getElementById('keyword-filter').value.toLowerCase().trim(), type: document.getElementById('type-filter').value }
}
function matchesFilters(session, filters) {
  if (filters.type && session.session_type !== filters.type) return false
  if (filters.keyword && !session.title.toLowerCase().includes(filters.keyword)) return false
  return true
}
async function loadCurrentView() {
  if (currentView === 'day') await loadDayView(); else await loadTableView()
}

function applyDayDefaults(sessionIds) {
  const teacher = document.getElementById('default-teacher').value
  const circler = document.getElementById('default-circler').value
  const director = document.getElementById('default-director').value
  sessionIds.forEach(id => {
    if (teacher && document.getElementById(`teacher-${id}`)) document.getElementById(`teacher-${id}`).value = teacher
    if (circler && document.getElementById(`circler-${id}`)) document.getElementById(`circler-${id}`).value = circler
    if (director && document.getElementById(`director-${id}`)) document.getElementById(`director-${id}`).value = director
  })
  const btn = document.getElementById('defaults-apply-btn')
  btn.textContent = 'Applied!'
  btn.classList.add('applied')
  setTimeout(() => { btn.textContent = 'Apply to all'; btn.classList.remove('applied') }, 2000)
}

async function loadDayView() {
  document.getElementById('date-bar').textContent = formatDate(currentDate)
  const container = document.getElementById('sessions-container')
  container.innerHTML = '<div class="loading">Loading...</div>'
  const filters = getFilters()
  const today = dateStr(currentDate)
  const { data: sessions } = await sb.from('sessions').select('*').eq('studio_id', currentStudioId).eq('session_date', today).eq('show', true).order('session_time')
  const filtered = (sessions || []).filter(s => matchesFilters(s, filters))
  const staffData = {}, bookingCounts = {}, estimatedAtt = {}
  if (filtered.length) {
    const ids = filtered.map(s => s.id)
    const { data: staff } = await sb.from('session_staff').select('*').in('session_id', ids)
    if (staff) staff.forEach(s => { staffData[s.session_id] = s })
    const { data: bookings } = await sb.from('bookings').select('session_id, qty, estimated_attendance').in('session_id', ids)
    if (bookings) bookings.forEach(b => {
      bookingCounts[b.session_id] = (bookingCounts[b.session_id] || 0) + (b.qty || 0)
      if (b.estimated_attendance) estimatedAtt[b.session_id] = (estimatedAtt[b.session_id] || 0) + b.estimated_attendance
    })
  }
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state"><h2>No sessions found</h2><p>Try adjusting your filters or selecting a different date.</p></div>'
    return
  }
  const sessionIds = filtered.map(s => s.id)
  const defaultsBar = `
    <div class="defaults-card">
      <div class="defaults-header">Apply to all sessions today</div>
      <div class="session-fields" style="grid-template-columns: 1fr 1fr 1fr auto; align-items: end;">
        <div class="field-group"><div class="field-label">Demoer</div><input type="text" id="default-teacher" placeholder="Fill all demoers..."></div>
        <div class="field-group"><div class="field-label">Circler</div><input type="text" id="default-circler" placeholder="Fill all circlers..."></div>
        <div class="field-group"><div class="field-label">Director</div><input type="text" id="default-director" placeholder="Fill all directors..."></div>
        <div class="field-group" style="justify-content:flex-end;">
          <button class="defaults-apply-btn" id="defaults-apply-btn" onclick="applyDayDefaults(${JSON.stringify(sessionIds)})">Apply to all</button>
        </div>
      </div>
    </div>`
  container.innerHTML = defaultsBar + filtered.map(s => {
    const staff = staffData[s.id] || {}
    const reg = bookingCounts[s.id] || 0
    const est = estimatedAtt[s.id] || null
    const isParty = s.session_type === 'party'
    const need2 = isParty && est && est > 15
    const badge = getBadgeClass(s.session_type)
    const time = s.session_time ? s.session_time.substring(0,5) : ''
    const partyInfoHtml = isParty && est
      ? `<div class="party-info"><strong>Expected:</strong> ${est} kids${need2 ? ' &mdash; <strong>2 staff needed</strong>' : ''}</div>`
      : ''
    const partyFormHtml = isParty ? `
      <div class="party-form">
        <div class="party-form-title">🎉 Party Details</div>
        <div class="session-fields">
          <div class="field-group">
            <div class="field-label">Art Time (minutes)</div>
            <select id="art_time-${s.id}" style="padding:8px 10px;border:0.5px solid #f0c8d4;border-radius:6px;font-size:14px;outline:none;width:100%;background:white;">
              <option value="">Select...</option>
              <option value="60" ${staff.art_time === '60' ? 'selected' : ''}>60 minutes</option>
              <option value="90" ${staff.art_time === '90' ? 'selected' : ''}>90 minutes</option>
            </select>
          </div>
          <div class="field-group">
            <div class="field-label">Party Time (minutes)</div>

async function loadTableView() {
  const container = document.getElementById('table-container')
  container.innerHTML = '<div class="loading">Loading...</div>'
  const days = parseInt(document.getElementById('range-select').value) || 7
  const filters = getFilters()
  const startDate = new Date(currentDate)
  const endDate = addDays(startDate, days - 1)
  const { data: sessions } = await sb.from('sessions').select('*').eq('studio_id', currentStudioId).eq('show', true).gte('session_date', dateStr(startDate)).lte('session_date', dateStr(endDate)).order('session_date').order('session_time')
  const filtered = (sessions || []).filter(s => matchesFilters(s, filters))
  if (!filtered.length) { container.innerHTML = '<div class="empty-state"><h2>No sessions found</h2><p>Try adjusting your filters or date range.</p></div>'; return }
  const bookingCounts = {}
  const sessionIds = filtered.map(s => s.id)
  const { data: bookings } = await sb.from('bookings').select('session_id, qty').in('session_id', sessionIds)
  if (bookings) bookings.forEach(b => { bookingCounts[b.session_id] = (bookingCounts[b.session_id] || 0) + (b.qty || 0) })
  const byDate = {}
  filtered.forEach(s => { if (!byDate[s.session_date]) byDate[s.session_date] = []; byDate[s.session_date].push(s) })
  const todayStr = dateStr(new Date())
  let html = '<table class="week-table"><thead><tr><th>Time</th><th>Session</th><th style="text-align:center">Reg</th><th style="text-align:center">Cap</th></tr></thead><tbody>'
  Object.keys(byDate).sort().forEach(date => {
    const d = new Date(date + 'T12:00:00')
    const isT = date === todayStr
    html += `<tr><td colspan="4" style="background:${isT ? '#e8e8e0' : '#f0f0e8'};font-weight:500;font-size:13px;padding:10px 12px;color:${isT ? '#1a1a1a' : '#444'}">${isT ? '&#9679; ' : ''}${d.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' })}</td></tr>`
    byDate[date].forEach(s => {
      const reg = bookingCounts[s.id] || 0
      const isFull = reg >= s.capacity
      const badge = getBadgeClass(s.session_type)
      const time = s.session_time ? s.session_time.substring(0,5) : ''
      const titleSafe = s.title.replace(/'/g, "\\'")
      const regColor = reg === 0 ? '#bbb' : isFull ? '#99354e' : '#1a4fa0'
      const regBg = reg === 0 ? 'transparent' : isFull ? '#fce8f0' : '#e8f0fe'
      html += `<tr style="cursor:pointer" onclick="showBookings('${s.id}','${titleSafe}','${date}','${s.session_type}')" onmouseover="this.style.background='#fafaf8'" onmouseout="this.style.background=''">
        <td style="color:#888;white-space:nowrap;width:60px">${time}</td>
        <td>${s.title} <span class="type-pill ${badge}">${s.session_type}</span></td>
        <td style="text-align:center"><span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:500;background:${regBg};color:${regColor}">${reg}</span></td>
        <td style="text-align:center;color:#888;font-size:13px">${s.capacity}</td>
      </tr>`
    })
  })
  html += '</tbody></table>'
  container.innerHTML = html
}

function parseLineItemProperties(rawPayload, sessionDate) {
  try {
    const payload = typeof rawPayload === 'string' ? JSON.parse(rawPayload) : rawPayload
    if (!payload?.line_items) return []
    const items = payload.line_items
    let match = items.find(li => {
      const t = (li.title || li.name || '').toLowerCase()
      if (sessionDate) {
        const d = new Date(sessionDate + 'T12:00:00')
        const monthDay = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }).replace('.', '').toLowerCase()
        if (t.includes(monthDay)) return true
        const day = d.getDate()
        const suffix = day === 1||day===21||day===31 ? 'st' : day===2||day===22 ? 'nd' : day===3||day===23 ? 'rd' : 'th'
        if (t.includes(`${monthDay}${suffix}`)) return true
      }
      return false
    })
    if (!match) match = items[0]
    return match?.properties || []
  } catch (e) { return [] }
}

function getGlazingPiece(rawPayload, sessionDate) {
  try {
    const payload = typeof rawPayload === 'string' ? JSON.parse(rawPayload) : rawPayload
    if (!payload?.line_items) return null
    const items = payload.line_items
    let match = items.find(li => {
      const t = (li.title || li.name || '').toLowerCase()
      if (sessionDate) {
        const d = new Date(sessionDate + 'T12:00:00')
        const monthDay = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }).replace('.', '').toLowerCase()
        if (t.includes(monthDay)) return true
      }
      return false
    })
    if (!match) match = items[0]
    const props = match?.properties || []
    return props.find(p => p.name?.toLowerCase().includes('glazing'))?.value || null
  } catch (e) { return null }
}

function formatDOB(dobStr, refDateStr) {
  try {
    const dob = new Date(dobStr + 'T12:00:00')
    const ref = refDateStr ? new Date(refDateStr + 'T12:00:00') : new Date()
    let age = ref.getFullYear() - dob.getFullYear()
    const m = ref.getMonth() - dob.getMonth()
    if (m < 0 || (m === 0 && ref.getDate() < dob.getDate())) age--
    const formatted = dob.toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' })
    return `Age ${age} · b. ${formatted}`
  } catch (e) { return dobStr }
}

function getPayloadPhone(rawPayload) {
  try {
    const p = typeof rawPayload === 'string' ? JSON.parse(rawPayload) : rawPayload
    return p?.billing_address?.phone || p?.shipping_address?.phone || p?.customer?.phone || p?.phone || ''
  } catch { return '' }
}

function getOrderNote(booking) {
  if (booking.order_note) return booking.order_note
  try {
    const p = typeof booking.raw_payload === 'string' ? JSON.parse(booking.raw_payload) : booking.raw_payload
    return p?.note || ''
  } catch { return '' }
}

async function showBookings(sessionId, title, dateLabel, sessionType) {
  const { data: bookings } = await sb.from('bookings')
    .select('customer_name, customer_email, customer_phone, qty, estimated_attendance, shopify_order_name, booked_at, raw_payload, event_date, order_note')
    .eq('session_id', sessionId)
    .order('booked_at')

  const seenOrders = new Set()
  const bookingsToUse = (bookings || []).filter(b => {
    if (!b.shopify_order_name) return true
    if (seenOrders.has(b.shopify_order_name)) return false
    seenOrders.add(b.shopify_order_name)
    return true
  })

  const orderNames = bookingsToUse.map(b => b.shopify_order_name).filter(Boolean)
  let tallyData = {}
  if (orderNames.length) {
    const { data: tally } = await sb.from('tally_registrations').select('*').in('shopify_order_name', orderNames)
    if (tally) tally.forEach(t => {
      if (!tallyData[t.shopify_order_name]) tallyData[t.shopify_order_name] = []
      tallyData[t.shopify_order_name].push(t)
    })
  }

  // Fetch attendance for this session
  let attendanceData = {}
  if (orderNames.length) {
    const { data: att } = await sb.from('attendance').select('*').eq('session_id', sessionId).in('shopify_order_name', orderNames)
    if (att) att.forEach(a => {
      const key = `${a.shopify_order_name}|${(a.camper_name || '').toLowerCase().trim()}`
      attendanceData[key] = a
    })
  }

  const listType = getListType(sessionType, title)
  const overlay = document.createElement('div')
  overlay.className = 'overlay'

  if (!bookingsToUse.length) {
    overlay.innerHTML = `
      <div class="overlay-card">
        <div class="overlay-header">
          <div><div class="overlay-title">${title}</div><div class="overlay-sub">${dateLabel}</div></div>
          <button class="close-btn no-print" onclick="this.closest('.overlay').remove()">&#215;</button>
        </div>
        <p style="color:#888;padding:2rem 0;text-align:center">No bookings yet for this session.</p>
      </div>`
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove() })
    document.body.appendChild(overlay)
    return
  }

  const total = bookingsToUse.reduce((sum, b) => sum + (b.qty || 0), 0)
  let tableHtml = ''

  if (listType === 'glazing') {
    tableHtml = buildGlazingTable(bookingsToUse, dateLabel)
  } else if (listType === 'workshop') {
    tableHtml = buildWorkshopTable(bookingsToUse)
  } else if (listType === 'camp') {
    tableHtml = buildCampTable(bookingsToUse, tallyData, attendanceData, sessionId, dateLabel)
  } else {
    tableHtml = buildWorkshopTable(bookingsToUse)
  }

  overlay.innerHTML = `
    <div class="overlay-card" id="print-area">
      <div class="overlay-header">
        <div>
          <div class="overlay-title">${title}</div>
          <div class="overlay-sub">${dateLabel} &mdash; ${total} registered</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="print-btn no-print" onclick="window.print()">🖨 Print</button>
          <button class="close-btn no-print" onclick="this.closest('.overlay').remove()">&#215;</button>
        </div>
      </div>
      ${tableHtml}
    </div>`

  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove() })
  document.body.appendChild(overlay)
}

// ── CAMP TABLE ─────────────────────────────────────────────────
function buildCampTable(bookings, tallyData, attendanceData, sessionId, dateLabel) {
  const rows = bookings.map(b => {
    const note = getOrderNote(b)
    const orderUid = (b.shopify_order_name || '').replace('#','') || Math.random().toString(36).slice(2)

    // Get participants from Shopify line item properties
    const props = parseLineItemProperties(b.raw_payload, b.event_date)
    let participants = props
      .filter(p => p.name?.toLowerCase().startsWith('participant'))
      .sort((a, z) => a.name.localeCompare(z.name))
      .map(p => {
        const name = p.value.split('|')[0]?.trim() || p.value
        const dobMatch = p.value.match(/DOB:\s*(\d{4}-\d{2}-\d{2})/)
        const dob = dobMatch ? dobMatch[1] : null
        const tally = (tallyData[b.shopify_order_name] || [])
          .find(t => t.camper_name?.toLowerCase().trim() === name.toLowerCase().trim())
        return { name, dob, tally, source: 'shopify' }
      })

    // Fall back to tally data if no Shopify participants
    if (participants.length === 0) {
      const tallyRows = (tallyData[b.shopify_order_name] || []).filter((t, idx, arr) =>
        arr.findIndex(x => x.camper_name?.toLowerCase().trim() === t.camper_name?.toLowerCase().trim()) === idx
      )
      participants = tallyRows.map(t => ({ name: t.camper_name, dob: null, age: t.camper_age, tally: t, source: 'tally' }))
    }

    if (participants.length === 0) {
      // No participant data — show fully editable new row
      const uid = orderUid
      const attKey = `${b.shopify_order_name}|`
      const att = attendanceData[attKey]
      const attChecked = att?.attended || false
      return `<tr>
        <td style="text-align:center"><input type="checkbox" class="attended-check" ${attChecked ? 'checked' : ''} onchange="saveAttendance('${sessionId}','${b.shopify_order_name}','',this.checked,'att-new-${uid}')"></td>
        <td>${editInput('cn-'+uid, '', 'Child name')}</td>
        <td>${editInput('ca-'+uid, '', 'Age', 'short')}</td>
        <td>${editCheck('wh-'+uid, false)}</td>
        <td>${editInput('mn-'+uid, '', 'Medical notes')}</td>
        <td>${editCheck('ac-'+uid, false)}</td>
        <td>${editInput('pp-'+uid, b.customer_phone || getPayloadPhone(b.raw_payload), 'Phone')}</td>
        <td>${editInput('ec-'+uid, '', 'Emergency contact')}</td>
        <td style="color:#888">${b.customer_name || '&mdash;'}</td>
        <td style="text-align:center">${b.qty}</td>
        <td style="color:#888">${b.shopify_order_name || '&mdash;'}</td>
        <td class="note-cell">${note || ''}</td>
        <td class="no-print"><button class="row-save-btn" onclick="saveCampRow(null,'${b.shopify_order_name}','${uid}','${sessionId}')">Save</button></td>
      </tr>`
    }

    return participants.map((p, i) => {
      const t = p.tally
      const uid = `${orderUid}-${i}`
      const camperName = p.name || ''
      const attKey = `${b.shopify_order_name}|${camperName.toLowerCase().trim()}`
      const att = attendanceData[attKey]
      const attChecked = att?.attended || false
      const ageDisplay = p.dob ? formatDOB(p.dob, dateLabel) : (p.age ? `Age ${p.age}` : '')

      return `<tr>
        <td style="text-align:center"><input type="checkbox" class="attended-check" ${attChecked ? 'checked' : ''} onchange="saveAttendance('${sessionId}','${b.shopify_order_name}','${camperName.replace(/'/g,"\\'")}',this.checked,'att-${uid}')"></td>
        <td>${editInput('cn-'+uid, camperName, 'Child name')}</td>
        <td style="font-size:12px;color:#666">${ageDisplay}</td>
        <td>${editCheck('wh-'+uid, t?.walk_home || false)}</td>
        <td>${editInput('mn-'+uid, t?.medical_notes || '', 'Medical notes')}</td>
        <td>${editCheck('ac-'+uid, t?.aftercare || false)}</td>
        <td>${editInput('pp-'+uid, t?.parent_phone || b.customer_phone || getPayloadPhone(b.raw_payload) || '', 'Phone')}</td>
        <td>${editInput('ec-'+uid, t ? (t.emergency_contact_name || '') + (t.emergency_contact_phone ? ' ' + t.emergency_contact_phone : '') : '', 'Emergency contact')}</td>
        <td style="color:#888">${i === 0 ? (b.customer_name || '&mdash;') : ''}</td>
        <td style="text-align:center">${i === 0 ? b.qty : ''}</td>
        <td style="color:#888">${i === 0 ? (b.shopify_order_name || '&mdash;') : ''}</td>
        <td class="note-cell">${i === 0 ? (note || '') : ''}</td>
        <td class="no-print"><button class="row-save-btn" onclick="saveCampRow('${t?.id || null}','${b.shopify_order_name}','${uid}','${sessionId}')">Save</button></td>
      </tr>`
    }).join('')
  }).join('')

  return `<table class="booking-table">
    <thead><tr>
      <th>✓</th>
      <th>Participant</th>
      <th>Age / DOB</th>
      <th>Walk home?</th>
      <th>Medical</th>
      <th>Aftercare</th>
      <th>Parent phone</th>
      <th>Emergency contact</th>
      <th>Registered by</th>
      <th style="text-align:center">Qty</th>
      <th>Order</th>
      <th>Notes</th>
      <th class="no-print"></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`
}

async function saveCampRow(tallyId, orderName, uid, sessionId) {
  const btn = document.querySelector(`button[onclick="saveCampRow('${tallyId}','${orderName}','${uid}','${sessionId}')"]`)
  const camper_name = document.getElementById(`cn-${uid}`)?.value?.trim()
  if (!camper_name) { alert('Please enter a child name'); return }

  const ecRaw = document.getElementById(`ec-${uid}`)?.value?.trim() || ''
  // Split emergency contact into name and phone (last word if looks like phone)
  const ecParts = ecRaw.split(' ')
  const lastPart = ecParts[ecParts.length - 1] || ''
  const ecPhone = lastPart.match(/[\d\+\-\(\)]{7,}/) ? lastPart : null
  const ecName = ecPhone ? ecParts.slice(0, -1).join(' ') : ecRaw

  const payload = {
    shopify_order_name: orderName,
    camper_name,
    camper_age: document.getElementById(`ca-${uid}`)?.value?.trim() || null,
    walk_home: document.getElementById(`wh-${uid}`)?.checked || false,
    medical_notes: document.getElementById(`mn-${uid}`)?.value?.trim() || null,
    aftercare: document.getElementById(`ac-${uid}`)?.checked || false,
    parent_phone: document.getElementById(`pp-${uid}`)?.value?.trim() || null,
    emergency_contact_name: ecName || null,
    emergency_contact_phone: ecPhone || null,
  }

  let error
  if (tallyId && tallyId !== 'null') {
    ;({ error } = await sb.from('tally_registrations').update(payload).eq('id', tallyId))
  } else {
    ;({ error } = await sb.from('tally_registrations').insert(payload))
  }

  if (error) { alert('Error saving: ' + error.message); return }
  if (btn) { btn.textContent = 'Saved ✓'; btn.classList.add('saved'); setTimeout(() => { btn.textContent = 'Save'; btn.classList.remove('saved') }, 2000) }
}

async function saveAttendance(sessionId, orderName, camperName, attended, btnId) {
  const today = dateStr(new Date())
  const key = `${orderName}|${camperName.toLowerCase().trim()}`

  // Check if record exists
  const { data: existing } = await sb.from('attendance')
    .select('id')
    .eq('session_id', sessionId)
    .eq('shopify_order_name', orderName)
    .eq('camper_name', camperName)
    .single()

  if (existing) {
    await sb.from('attendance').update({ attended, attended_date: today }).eq('id', existing.id)
  } else {
    await sb.from('attendance').insert({
      session_id: sessionId,
      shopify_order_name: orderName,
      camper_name: camperName,
      attended,
      attended_date: today
    })
  }
}

async function togglePrep(sessionId, checked) {
  const label = document.querySelector(`label[for="prep-${sessionId}"]`)
  if (label) { label.textContent = checked ? 'Ready' : 'Not yet'; label.className = 'prep-label ' + (checked ? 'done' : '') }
}

async function saveSession(sessionId, isParty) {
  const teacher = document.getElementById(`teacher-${sessionId}`).value
  const circler = document.getElementById(`circler-${sessionId}`).value
  const director = document.getElementById(`director-${sessionId}`).value
  const prepDone = document.getElementById(`prep-${sessionId}`).checked
  const notes = document.getElementById(`notes-${sessionId}`).value
  const btn = document.querySelector(`#card-${sessionId} .save-btn`)
  const payload = {
    session_id: sessionId,
    studio_id: currentStudioId,
    teacher, circler, director,
    prep_done: prepDone,
    notes,
    updated_at: new Date().toISOString()
  }
  if (isParty) {
    payload.art_time = document.getElementById(`art_time-${sessionId}`).value
    payload.party_time = document.getElementById(`party_time-${sessionId}`).value
    payload.project = document.getElementById(`project-${sessionId}`).value
    payload.party_order = document.getElementById(`party_order-${sessionId}`).value
    payload.party_reason = document.getElementById(`party_reason-${sessionId}`).value
    payload.contact_name = document.getElementById(`contact_name-${sessionId}`).value
    payload.contacted = document.getElementById(`contacted-${sessionId}`).value
    payload.prepaid_participants = document.getElementById(`prepaid_participants-${sessionId}`).value
    payload.party_notes = document.getElementById(`party_notes-${sessionId}`).value
  }
  const { data: existing } = await sb.from('session_staff').select('id').eq('session_id', sessionId).single()
  if (existing) {
    await sb.from('session_staff').update(payload).eq('session_id', sessionId)
  } else {
    await sb.from('session_staff').insert(payload)
  }
  btn.textContent = 'Saved'
  btn.classList.add('saved')
  setTimeout(() => { btn.textContent = 'Save'; btn.classList.remove('saved') }, 2000)
}
