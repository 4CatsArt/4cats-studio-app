<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4CATS Studio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.login-card { background: white; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 2rem; width: 100%; max-width: 380px; }
.login-card h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
.login-card p { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
.login-card input { width: 100%; padding: 10px 12px; border: 0.5px solid #d0d0c8; border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none; display: block; }
.login-card button { width: 100%; padding: 10px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.error-msg { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }
#app-screen { display: none; padding: 2rem; max-width: 900px; margin: 0 auto; }
.app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
.app-header h1 { font-size: 22px; font-weight: 500; }
.meta { font-size: 14px; color: #888; }
.signout-btn { font-size: 13px; color: #888; background: none; border: none; cursor: pointer; padding: 6px 12px; border-radius: 6px; }
.signout-btn:hover { background: #eee; }
.date-bar { font-size: 16px; font-weight: 500; margin-bottom: 1.5rem; color: #444; }
.session-card { background: white; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 1.25rem; margin-bottom: 1rem; }
.session-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.session-title { font-size: 16px; font-weight: 500; }
.session-time { font-size: 14px; color: #888; margin-top: 2px; }
.session-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.badge-party { background: #fce8f0; color: #99354e; }
.badge-workshop { background: #e8f0fe; color: #1a4fa0; }
.badge-glazing { background: #e8f5e9; color: #2e7d32; }
.session-stats { display: flex; gap: 1.5rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid #f0f0e8; }
.stat { text-align: center; }
.stat-value { font-size: 22px; font-weight: 500; }
.stat-label { font-size: 11px; color: #888; margin-top: 2px; }
.stat-warn { color: #e65100; }
.session-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-group.full { grid-column: 1 / -1; }
.field-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.field-group input[type="text"] { padding: 8px 10px; border: 0.5px solid #d0d0c8; border-radius: 6px; font-size: 14px; outline: none; width: 100%; }
.field-group input[type="text"]:focus { border-color: #888; }
.prep-row { display: flex; align-items: center; gap: 10px; }
.prep-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #1a1a1a; }
.prep-label { font-size: 14px; }
.prep-label.done { color: #2e7d32; font-weight: 500; }
.save-btn { margin-top: 12px; padding: 8px 20px; background: #1a1a1a; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; float: right; }
.save-btn:hover { background: #333; }
.save-btn.saved { background: #2e7d32; }
.empty-state { text-align: center; padding: 4rem 2rem; color: #888; }
.empty-state h2 { font-size: 18px; font-weight: 400; margin-bottom: 0.5rem; }
.loading { text-align: center; padding: 4rem; color: #888; }
.party-info { background: #fce8f0; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #99354e; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>4CATS Studio</h1>
    <p>Sign in to view your schedule</p>
    <input type="email" id="email-input" placeholder="Email address">
    <input type="password" id="password-input" placeholder="Password">
    <button onclick="signIn()">Sign in</button>
    <div class="error-msg" id="error-msg">Incorrect email or password.</div>
  </div>
</div>

<div id="app-screen">
  <div class="app-header">
    <div>
      <h1 id="studio-name">Studio</h1>
      <div class="meta" id="studio-meta"></div>
    </div>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
  <div class="date-bar" id="date-bar"></div>
  <div id="sessions-container"><div class="loading">Loading...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://snxibhbhhchjthfmjtaj.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNueGliaGJoaGNoanRoZm1qdGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTk2ODAsImV4cCI6MjA5MjYzNTY4MH0.K-89Mx4SxU6N1hMmtK6Q79rWAtk6VTN9b5wemQxcZVA'
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

let currentStudioId = null
let currentUser = null

async function signIn() {
  const email = document.getElementById('email-input').value
  const password = document.getElementById('password-input').value
  const errEl = document.getElementById('error-msg')
  errEl.style.display = 'none'
  const { data, error } = await sb.auth.signInWithPassword({ email, password })
  if (error) { errEl.style.display = 'block'; return }
  currentUser = data.user
  await loadApp()
}

async function signOut() {
  await sb.auth.signOut()
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('app-screen').style.display = 'none'
}

async function loadApp() {
  const { data: mapping, error: mappingError } = await sb
    .from('studio_users')
    .select('studio_id')
    .eq('user_id', currentUser.id)
    .single()

  if (mappingError || !mapping) {
    alert('No studio linked to this account. Please contact home office.')
    return
  }

  const { data: studio, error: studioError } = await sb
    .from('studios')
    .select('name, city, province')
    .eq('id', mapping.studio_id)
    .single()

  if (studioError || !studio) {
    alert('Could not load studio information. Please contact home office.')
    return
  }

  currentStudioId = mapping.studio_id
  document.getElementById('studio-name').textContent = studio.name
  document.getElementById('studio-meta').textContent = studio.city + ', ' + studio.province

  const today = new Date()
  document.getElementById('date-bar').textContent = today.toLocaleDateString('en-CA', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  })

  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app-screen').style.display = 'block'
  await loadSessions()
}

async function loadSessions() {
  const today = new Date().toISOString().split('T')[0]

  const { data: sessions } = await sb
    .from('sessions')
    .select('*')
    .eq('studio_id', currentStudioId)
    .eq('session_date', today)
    .eq('show', true)
    .order('session_time')

  const staffData = {}
  const bookingCounts = {}
  const estimatedAtt = {}

  if (sessions && sessions.length) {
    const ids = sessions.map(s => s.id)

    const { data: staff } = await sb.from('session_staff').select('*').in('session_id', ids)
    if (staff) staff.forEach(s => { staffData[s.session_id] = s })

    const { data: bookings } = await sb.from('bookings').select('session_id, qty, estimated_attendance').in('session_id', ids)
    if (bookings) bookings.forEach(b => {
      bookingCounts[b.session_id] = (bookingCounts[b.session_id] || 0) + (b.qty || 0)
      if (b.estimated_attendance) estimatedAtt[b.session_id] = (estimatedAtt[b.session_id] || 0) + b.estimated_attendance
    })
  }

  const container = document.getElementById('sessions-container')

  if (!sessions || !sessions.length) {
    container.innerHTML = '<div class="empty-state"><h2>No sessions scheduled for today</h2><p>Check back later or contact home office.</p></div>'
    return
  }

  container.innerHTML = sessions.map(s => {
    const staff = staffData[s.id] || {}
    const reg = bookingCounts[s.id] || 0
    const est = estimatedAtt[s.id] || null
    const isParty = s.session_type === 'party'
    const need2 = isParty && est && est > 15
    const badge = {party:'badge-party',workshop:'badge-workshop',glazing:'badge-glazing'}[s.session_type] || 'badge-workshop'
    const time = s.session_time ? s.session_time.substring(0,5) : ''
    const partyHtml = isParty && est
      ? `<div class="party-info"><strong>Expected:</strong> ${est} kids${need2 ? ' — <strong>2 teachers needed</strong>' : ''}</div>`
      : ''

    return `
    <div class="session-card" id="card-${s.id}">
      <div class="session-header">
        <div>
          <div class="session-title">${s.title}</div>
          <div class="session-time">${time}</div>
        </div>
        <span class="session-badge ${badge}">${s.session_type}</span>
      </div>
      ${partyHtml}
      <div class="session-stats">
        <div class="stat" style="cursor:pointer" onclick="showBookings('${s.id}', '${s.title}')"><div class="stat-value" style="text-decoration:underline;text-decoration-style:dotted">${reg}</div><div class="stat-label">registered ↗</div></div>
        <div class="stat"><div class="stat-value">${s.capacity}</div><div class="stat-label">capacity</div></div>
        ${est ? `<div class="stat"><div class="stat-value ${need2 ? 'stat-warn' : ''}">${est}</div><div class="stat-label">expected</div></div>` : ''}
      </div>
      <div class="session-fields">
        <div class="field-group">
          <div class="field-label">Teacher</div>
          <input type="text" id="teacher-${s.id}" value="${staff.teacher || ''}" placeholder="Assign teacher">
        </div>
        <div class="field-group">
          <div class="field-label">Prep done</div>
          <div class="prep-row">
            <input type="checkbox" class="prep-checkbox" id="prep-${s.id}" ${staff.prep_done ? 'checked' : ''} onchange="togglePrep('${s.id}', this.checked)">
            <label class="prep-label ${staff.prep_done ? 'done' : ''}" for="prep-${s.id}">${staff.prep_done ? 'Ready' : 'Not yet'}</label>
          </div>
        </div>
        <div class="field-group full">
          <div class="field-label">Notes</div>
          <input type="text" id="notes-${s.id}" value="${staff.notes || ''}" placeholder="Add notes...">
        </div>
      </div>
      <button class="save-btn" onclick="saveSession('${s.id}')">Save</button>
      <div style="clear:both"></div>
    </div>`
  }).join('')
}

async function togglePrep(sessionId, checked) {
  const label = document.querySelector(`label[for="prep-${sessionId}"]`)
  label.textContent = checked ? 'Ready' : 'Not yet'
  label.className = 'prep-label ' + (checked ? 'done' : '')
}

async function saveSession(sessionId) {
  const teacher = document.getElementById(`teacher-${sessionId}`).value
  const prepDone = document.getElementById(`prep-${sessionId}`).checked
  const notes = document.getElementById(`notes-${sessionId}`).value
  const btn = document.querySelector(`#card-${sessionId} .save-btn`)

  const { data: existing } = await sb.from('session_staff').select('id').eq('session_id', sessionId).single()

  const payload = {
    session_id: sessionId,
    studio_id: currentStudioId,
    teacher,
    prep_done: prepDone,
    notes,
    updated_at: new Date().toISOString()
  }

  if (existing) {
    await sb.from('session_staff').update(payload).eq('session_id', sessionId)
  } else {
    await sb.from('session_staff').insert(payload)
  }

  btn.textContent = 'Saved'
  btn.classList.add('saved')
  setTimeout(() => { btn.textContent = 'Save'; btn.classList.remove('saved') }, 2000)
}
async function showBookings(sessionId, title) {
  const { data: bookings } = await sb
    .from('bookings')
    .select('customer_name, customer_email, qty, estimated_attendance, event_type, shopify_order_name, booked_at')
    .eq('session_id', sessionId)
    .order('booked_at')

  if (!bookings || !bookings.length) {
    alert('No bookings yet for ' + title)
    return
  }

  const rows = bookings.map(b => {
    const time = new Date(b.booked_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
    const extra = b.estimated_attendance ? ' — ' + b.estimated_attendance + ' expected' : ''
    return `<tr>
      <td style="padding:8px 12px;border-bottom:0.5px solid #f0f0e8">${b.customer_name || '—'}</td>
      <td style="padding:8px 12px;border-bottom:0.5px solid #f0f0e8;color:#888">${b.customer_email || '—'}</td>
      <td style="padding:8px 12px;border-bottom:0.5px solid #f0f0e8;text-align:center">${b.qty}</td>
      <td style="padding:8px 12px;border-bottom:0.5px solid #f0f0e8;color:#888">${b.shopify_order_name || '—'}${extra}</td>
      <td style="padding:8px 12px;border-bottom:0.5px solid #f0f0e8;color:#888;font-size:12px">${time}</td>
    </tr>`
  }).join('')

  const total = bookings.reduce((sum, b) => sum + (b.qty || 0), 0)

  const overlay = document.createElement('div')
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:2rem'
  overlay.innerHTML = `
    <div style="background:white;border-radius:12px;width:100%;max-width:700px;max-height:80vh;overflow:auto;padding:1.5rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div>
          <h2 style="font-size:18px;font-weight:500">${title}</h2>
          <p style="font-size:13px;color:#888">${total} registered</p>
        </div>
        <button onclick="this.closest('.overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;padding:4px 8px">×</button>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:14px">
        <thead>
          <tr style="text-align:left">
            <th style="padding:8px 12px;font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:0.5px">Name</th>
            <th style="padding:8px 12px;font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:0.5px">Email</th>
            <th style="padding:8px 12px;font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;text-align:center">Qty</th>
            <th style="padding:8px 12px;font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:0.5px">Order</th>
            <th style="padding:8px 12px;font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:0.5px">Booked</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `
  overlay.classList.add('overlay')
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove() })
  document.body.appendChild(overlay)
}

</script>
</body>
</html>
